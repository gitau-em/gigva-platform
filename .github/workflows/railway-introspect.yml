name: Railway Login Signature Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway loginSessionCreate and loginSessionConsume signatures
        run: |
          # Get full type info for loginSessionCreate
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H 'Content-Type: application/json' \
            -H 'Origin: https://railway.com' \
            -d '{"query":"{ __schema { mutationType { fields { name args { name type { name kind ofType { name kind } } } type { name kind ofType { name kind } } } } } }"}' > /tmp/full_schema.json
          
          python3 << 'PYEOF'
import json
with open('/tmp/full_schema.json') as f:
    data = json.load(f)

fields = data.get('data',{}).get('__schema',{}).get('mutationType',{}).get('fields',[])
targets = ['loginSessionCreate', 'loginSessionConsume', 'loginSessionAuth', 'loginSessionVerify', 'apiTokenCreate']

for field in fields:
    if field['name'] in targets:
        args_info = []
        for arg in field.get('args', []):
            t = arg['type']
            type_str = t.get('name') or f"{t.get('kind')}({t.get('ofType',{}).get('name','')})"
            args_info.append(f"{arg['name']}: {type_str}")
        ret_type = field['type']
        ret_str = ret_type.get('name') or f"{ret_type.get('kind')}({ret_type.get('ofType',{}).get('name','')})"
        print(f"  {field['name']}({', '.join(args_info)}) -> {ret_str}")
PYEOF

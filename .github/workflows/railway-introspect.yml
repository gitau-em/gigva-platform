name: Railway API Introspect

on:
  workflow_dispatch:

jobs:
  introspect:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Introspect Railway GraphQL API mutations
        run: |
          # Try GraphQL introspection
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H 'Content-Type: application/json' \
            -H 'Origin: https://railway.com' \
            -d '{"query":"{ __schema { mutationType { fields { name } } } }"}' > /tmp/introspect.json
          cat /tmp/introspect.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          mutations = data.get('data',{}).get('__schema',{}).get('mutationType',{}).get('fields',[])
          auth_mutations = [m['name'] for m in mutations if any(kw in m['name'].lower() for kw in ['login','session','token','auth','register'])]
          print('Auth mutations:', auth_mutations)
          print('Total:', len(mutations))
          "
          
      - name: Check Railway CLI source for login mutation
        run: |
          RAILWAY_PATH=$(npm root -g)/@railway/cli
          echo "CLI path: $RAILWAY_PATH"
          find $RAILWAY_PATH/dist -name "*.js" -exec grep -l "loginSession\|LoginSession\|AuthSession" {} \; 2>/dev/null | head -5
          find $RAILWAY_PATH/dist -name "*.js" 2>/dev/null | xargs grep -l "mutation.*[Ll]ogin" 2>/dev/null | head -3 | while read f; do
            echo "=== $f ==="
            grep -A3 "mutation.*[Ll]ogin\|[Ll]ogin.*mutation" "$f" | head -20
          done

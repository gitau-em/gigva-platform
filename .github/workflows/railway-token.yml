name: Railway Auth and Deploy

on:
  workflow_dispatch:
    inputs:
      wait_minutes:
        description: Minutes to wait for Railway login approval
        required: false
        default: "5"

jobs:
  authenticate:
    runs-on: ubuntu-latest
    outputs:
      railway_token: ${{ steps.get_token.outputs.RAILWAY_TOKEN }}
    steps:
      - name: Create Railway login session
        id: login_session
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Origin: https://railway.com" \
            -d '{"query":"mutation { loginSessionCreate }"}')
          echo "Raw response: $RESPONSE"
          CODE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('loginSessionCreate',''))")
          echo "code=$CODE" >> $GITHUB_OUTPUT
          LOGIN_URL="https://railway.com/cli-login?d=$CODE"
          echo ""
          echo "================================================"
          echo "  RAILWAY LOGIN URL:"
          echo "  $LOGIN_URL"
          echo "================================================"
          echo "::notice title=RAILWAY LOGIN REQUIRED::$LOGIN_URL"

      - name: Wait for Railway login approval
        run: |
          WAIT_MINS=${{ github.event.inputs.wait_minutes }}
          echo "Waiting ${WAIT_MINS} minutes for login..."
          sleep $((WAIT_MINS * 60))
          echo "URL was: https://railway.com/cli-login?d=${{ steps.login_session.outputs.code }}"

      - name: Consume Railway session to get token
        id: get_token
        run: |
          CODE="${{ steps.login_session.outputs.code }}"
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Origin: https://railway.com" \
            -d "{\"query\":\"mutation { loginSessionConsume(code: \\\"${CODE}\\\") }\"}")
          echo "Consume response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('loginSessionConsume',''))" 2>/dev/null)
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "None" ] && [ "$TOKEN" != "null" ]; then
            echo "::add-mask::$TOKEN"
            echo "RAILWAY_TOKEN=$TOKEN" >> $GITHUB_OUTPUT
            echo "SUCCESS: Got Railway token!"
          else
            echo "Failed response: $RESPONSE"
            exit 1
          fi

  setup-railway:
    needs: authenticate
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ needs.authenticate.outputs.railway_token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify login and create project
        run: |
          railway whoami
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Origin: https://railway.com" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -d '{"query":"mutation { projectCreate(input: { name: \"Gigva Platform\" }) { id name } }"}')
          echo "Project: $RESPONSE"
          PROJECT_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('projectCreate',{}).get('id',''))" 2>/dev/null)
          echo "Project ID: $PROJECT_ID"
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
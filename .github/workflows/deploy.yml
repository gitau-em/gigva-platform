name: CI Build Check

on:
  push:
      branches:
            - main
              workflow_dispatch:

              jobs:
                build:
                    runs-on: ubuntu-latest
                        steps:
                              - name: Checkout code
                                      uses: actions/checkout@v4

                                            - name: Setup Node.js
                                                    uses: actions/setup-node@v4
                                                            with:
                                                                      node-version: '18'
                                                                                cache: 'npm'

                                                                                      - name: Install dependencies
                                                                                              run: npm ci

                                                                                                    - name: Build application
                                                                                                            run: npm run build
                                                                                                                    env:
                                                                                                                              JWT_SECRET: build_placeholder_secret_64bytes_long_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
                                                                                                                                        NEXT_PUBLIC_TAWK_PROPERTY_ID: 69e4940849bb761c347cdbc7
                                                                                                                                                  NEXT_PUBLIC_TAWK_WIDGET_ID: 1jmie4h09
                                                                                                                                                            NODE_ENV: production

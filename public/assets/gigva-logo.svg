<?xml version="1.0" encoding="UTF-8"?>
<svg width="304" height="80" viewBox="0 0 304 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gigva Kenya Logo">
  <title>Gigva Kenya</title>
